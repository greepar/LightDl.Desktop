name: LightDl Desktop Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: lightdl-release-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.0.x"
  PROJECT_PATH: "LightDl.Desktop/LightDl.Desktop.csproj"

jobs:
  desktop:
    name: Desktop (${{ matrix.rid }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            rid: win-x86
          - runner: windows-latest
            rid: win-x64
          - runner: windows-latest
            rid: win-arm64
          - runner: ubuntu-latest
            rid: linux-x64
          - runner: ubuntu-24.04-arm
            rid: linux-arm64
          - runner: macos-14
            rid: osx-x64
          - runner: macos-14
            rid: osx-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            fontconfig \
            libfontconfig1-dev \
            libfreetype6-dev \
            libgl1-mesa-dev \
            libice-dev \
            libsm-dev \
            libx11-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxrandr-dev \
            libxrender-dev \
            libxtst-dev \
            zlib1g-dev

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }} -r ${{ matrix.rid }}

      - name: Publish NativeAOT
        run: >
          dotnet publish ${{ env.PROJECT_PATH }}
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          --no-restore
          -o publish/${{ matrix.rid }}
          -p:PublishSingleFile=true
          -p:StripSymbols=true

      - name: Remove debug symbols
        shell: pwsh
        run: |
          Get-ChildItem "publish/${{ matrix.rid }}" -Recurse -Include *.pdb,*.dbg | Remove-Item -Force
          Get-ChildItem "publish/${{ matrix.rid }}" -Recurse -Directory -Filter *.dSYM | Remove-Item -Recurse -Force

      - name: Verify single executable output
        shell: pwsh
        run: |
          $files = Get-ChildItem "publish/${{ matrix.rid }}" -File
          if ($files.Count -ne 1) {
            $files | Format-Table FullName, Length
            throw "Expected exactly one published file, found $($files.Count)."
          }
          if ($files[0].Name -like "LightDl.BrowserHost*") {
            throw "BrowserHost must be integrated into LightDl.Desktop."
          }

      - name: Create Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "publish/${{ matrix.rid }}/*" -DestinationPath "lightdl-desktop-${{ matrix.rid }}.zip"

      - name: Create Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd "publish/${{ matrix.rid }}"
          zip -r "../../lightdl-desktop-${{ matrix.rid }}.zip" .

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: lightdl-desktop-${{ matrix.rid }}
          path: lightdl-desktop-${{ matrix.rid }}.zip
          if-no-files-found: error

  browser-extensions:
    name: Browser extensions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate JavaScript and manifests
        run: |
          node --check browser-extensions/automatic/chromium/background.js
          node --check browser-extensions/automatic/firefox/background.js
          node -e "JSON.parse(require('fs').readFileSync('browser-extensions/automatic/chromium/manifest.json', 'utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('browser-extensions/automatic/firefox/manifest.json', 'utf8'))"

      - name: Lint Firefox extension
        run: npx --yes web-ext@latest lint --source-dir browser-extensions/automatic/firefox

      - name: Build extension archives
        run: |
          mkdir -p artifacts
          cd browser-extensions/automatic/chromium
          zip -r ../../../artifacts/lightdl-automatic-chromium.zip . -x '*.DS_Store'
          cd ../firefox
          zip -r ../../../artifacts/lightdl-automatic-firefox.zip . -x '*.DS_Store'

      - name: Verify archive roots
        run: |
          unzip -p artifacts/lightdl-automatic-chromium.zip manifest.json >/dev/null
          unzip -p artifacts/lightdl-automatic-firefox.zip manifest.json >/dev/null

      - name: Upload browser extension artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lightdl-browser-extensions
          path: artifacts/*.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - desktop
      - browser-extensions
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true

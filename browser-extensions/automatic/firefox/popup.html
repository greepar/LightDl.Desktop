<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LightDl Automatic Integration</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <img src="icons/icon-48.png" alt="">
    <div>
      <strong>LightDl</strong>
      <span>浏览器自动接管</span>
    </div>
  </header>
  <p>下载任务会通过 Native Messaging 发送到同一台电脑上的 LightDl。</p>
  <ul>
    <li>需要安装并运行 LightDl Desktop</li>
    <li>需要在 LightDl 中注册浏览器宿主</li>
    <li>接管失败或被拒绝时，浏览器会恢复原下载</li>
  </ul>
  <p class="privacy">下载 URL 和必要 Cookie 仅用于本机下载，不会发送到开发者服务器。</p>
</body>
</html>
